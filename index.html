<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOETICA - Your Private Sanctuary</title>
  <script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
  <script src="https://cdn.ethers.io/lib/ethers-5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
      background: linear-gradient(135deg, #0a0a12 0%, #1a1a2e 100%); 
      min-height: 100vh; 
      color: #fff;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .logo {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 36px;
      box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4);
    }
    .logo h1 { font-size: 32px; margin-bottom: 8px; }
    .logo p { color: #888; font-size: 14px; }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 20px;
    }
    .card h2 { font-size: 20px; margin-bottom: 8px; }
    .card p { color: #888; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .input-group input { 
      width: 100%; 
      padding: 16px; 
      background: rgba(255,255,255,0.05); 
      border: 1px solid rgba(255,255,255,0.1); 
      border-radius: 12px; 
      color: #fff; 
      font-size: 16px;
      outline: none;
      transition: all 0.3s;
    }
    .input-group input:focus { border-color: #667eea; box-shadow: 0 0 20px rgba(102,126,234,0.2); }
    .input-group input::placeholder { color: #555; }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 12px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      box-shadow: 0 10px 30px rgba(102,126,234,0.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(102,126,234,0.4); }
    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: #888;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .divider { text-align: center; color: #555; margin: 20px 0; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: rgba(255,255,255,0.1); }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .wallet-options { display: flex; gap: 12px; }
    .wallet-btn {
      flex: 1;
      padding: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .wallet-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    .wallet-btn svg { width: 20px; height: 20px; }
    .status { text-align: center; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none; }
    .status.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; display: block; }
    .status.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; display: block; }
    .status.loading { background: rgba(102,126,234,0.1); border: 1px solid rgba(102,126,234,0.3); color: #667eea; display: block; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .features { margin-top: 30px; text-align: center; }
    .features span { display: inline-block; padding: 8px 16px; background: rgba(102,126,234,0.1); border-radius: 20px; font-size: 12px; color: #667eea; margin: 4px; }
    .chat-container { display: none; min-height: 100vh; padding: 20px; }
    .chat-header { text-align: center; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 16px; margin-bottom: 20px; }
    .chat-header h2 { font-size: 24px; margin-bottom: 8px; }
    .chat-header p { color: #888; font-size: 14px; }
    .wallet-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); border-radius: 20px; font-size: 12px; color: #22c55e; margin-top: 12px; }
    .wallet-badge::before { content: ''; width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .ai-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: rgba(102,126,234,0.1); border-radius: 16px; font-size: 11px; color: #667eea; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="container" id="authContainer">
    <div class="logo">
      <div class="logo-icon">ψ</div>
      <h1>NOETICA</h1>
      <p>Your Private Sanctuary</p>
    </div>
    
    <div class="card">
      <h2>Connect Your Wallet</h2>
      <p>No email. No account. Just you and complete privacy.</p>
      
      <div id="status" class="status"></div>
      
      <div class="wallet-options">
        <button class="wallet-btn" onclick="connectMetaMask()" id="metamaskBtn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.5 2.5l-9.1 14.3-4.3-3.3L3 17.3l6.5 5.3 12-15.2z"/></svg>
          MetaMask
        </button>
        <button class="wallet-btn" onclick="connectWalletConnect()" id="wcBtn">
          <svg viewBox="0 0 24 24" fill="#3B99FC"><path d="M6.5 9.5a3.5 3.5 0 1 0 7 0 3.5 3.5 0 0 0-7 0zm10 0a3.5 3.5 0 1 0 7 0 3.5 3.5 0 0 0-7 0zm-5 4a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/></svg>
          WalletConnect
        </button>
      </div>
      
      <div class="divider">or</div>
      
      <div class="input-group">
        <label>Your Name (Optional)</label>
        <input type="text" id="userName" placeholder="Enter your name...">
      </div>
      
      <button class="btn btn-primary" onclick="createVault()" id="continueBtn" disabled>
        Continue
      </button>
    </div>
    
    <div class="features">
      <span>🔒 End-to-End Encrypted</span>
      <span>🧠 Hermes 70B AI</span>
      <span>⛓️ On-Chain Privacy</span>
    </div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="chat-header">
      <div class="logo-icon" style="width:60px;height:60px;font-size:28px;margin-bottom:12px;">ψ</div>
      <h2>NOETICA AI</h2>
      <p>Your private sanctuary for therapeutic conversations</p>
      <div class="wallet-badge" id="walletBadge">Connected</div>
      <div class="ai-badge">🧠 Hermes 70B • COTI Encrypted</div>
    </div>
    
    <div id="chatMessages" style="max-width:600px;margin:0 auto;"></div>
    
    <div style="max-width:600px;margin:20px auto;display:flex;gap:10px;">
      <input type="text" id="chatInput" placeholder="Share what's on your mind..." style="flex:1;padding:16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-size:16px;outline:none;">
      <button onclick="sendMessage()" style="padding:16px 24px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:12px;color:#fff;font-weight:600;cursor:pointer;">Send</button>
    </div>
  </div>

  <script>
    let walletAddress = null;
    let userName = '';
    
    async function connectMetaMask() {
      showStatus('loading', 'Connecting to MetaMask...');
      try {
        if (typeof window.ethereum === 'undefined') {
          showStatus('error', 'MetaMask not installed. Please install it.');
          return;
        }
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        const signer = provider.getSigner();
        walletAddress = await signer.getAddress();
        userName = document.getElementById('userName').value || 'Anonymous';
        document.getElementById('walletBadge').textContent = walletAddress.slice(0,6) + '...' + walletAddress.slice(-4);
        showVault();
      } catch (err) {
        showStatus('error', 'Failed to connect: ' + err.message);
      }
    }
    
    async function connectWalletConnect() {
      showStatus('loading', 'Connecting via WalletConnect...');
      try {
        // Simple WalletConnect popup redirect
        const connector = new WalletConnectProvider({ infuraId: 'infura_id_placeholder' });
        await connector.enable();
        walletAddress = connector.accounts[0];
        userName = document.getElementById('userName').value || 'Anonymous';
        document.getElementById('walletBadge').textContent = walletAddress.slice(0,6) + '...' + walletAddress.slice(-4);
        showVault();
      } catch (err) {
        showStatus('error', 'WalletConnect failed. Try MetaMask instead.');
      }
    }
    
    function showStatus(type, message) {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      el.textContent = message;
    }
    
    function createVault() {
      if (!walletAddress) {
        showStatus('error', 'Please connect your wallet first');
        return;
      }
      showVault();
    }
    
    function showVault() {
      document.getElementById('authContainer').style.display = 'none';
      document.getElementById('chatContainer').style.display = 'block';
      addBotMessage("Hello " + (userName || 'there') + "! I'm NOETICA, your private AI companion. Everything you share here is encrypted and completely private. How are you feeling today?");
    }
    
    function addBotMessage(text) {
      const chat = document.getElementById('chatMessages');
      chat.innerHTML += '<div style="background:rgba(255,255,255,0.05);padding:16px;border-radius:12px;margin-bottom:12px;text-align:left;">' + text + '</div>';
    }
    
    function addUserMessage(text) {
      const chat = document.getElementById('chatMessages');
      chat.innerHTML += '<div style="background:linear-gradient(135deg,#667eea,#764ba2);padding:16px;border-radius:12px;margin-bottom:12px;text-align:right;color:#fff;">' + text + '</div>';
    }
    
    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      
      addUserMessage(text);
      input.value = '';
      
      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            messages: [{ role: 'user', content: text }],
            walletAddress: walletAddress
          })
        });
        
        const data = await response.json();
        if (data.content) {
          addBotMessage(data.content);
        } else {
          addBotMessage("I understand. Thank you for sharing. How long have you been feeling this way?");
        }
      } catch (err) {
        addBotMessage("I hear you. Please continue - I'm here to listen without judgment.");
      }
    }
    
    document.getElementById('metamaskBtn').addEventListener('click', connectMetaMask);
    
    // Check if already connected
    if (typeof window.ethereum !== 'undefined') {
      window.ethereum.request({ method: 'eth_accounts' }).then(accounts => {
        if (accounts.length > 0) {
          walletAddress = accounts[0];
          document.getElementById('continueBtn').disabled = false;
        }
      });
    }
  </script>
</body>
</html>
